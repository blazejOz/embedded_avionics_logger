name: Build Firmware

# Runs on all branches and PRs
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: true

    - name: Install ARM GCC Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi libnewlib-arm-none-eabi cmake build-essential

    - name: Setup Raspberry Pi Pico SDK
      uses: actions/checkout@v4
      with:
        repository: raspberrypi/pico-sdk
        ref: master 
        path: pico-sdk
        submodules: true

    - name: Configure CMake
      env:
        PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
      run: cmake -B build

    - name: Build project
      run: cmake --build build

    - name: Upload UF2 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flight-recorder-firmware
        path: build/*.uf2