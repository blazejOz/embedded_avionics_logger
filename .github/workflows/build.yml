name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        submodules: true
        fetch-depth: 1

    - name: Install ARM GCC Toolchain
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib cmake build-essential
        
    - name: Cache Pico SDK
      id: cache-pico-sdk
      uses: actions/cache@v4
      with:
        path: pico-sdk
        key: pico-sdk-${{ runner.os }}-master

    - name: Setup Raspberry Pi Pico SDK
      if: steps.cache-pico-sdk.outputs.cache-hit != 'true'
      run: |
        git clone --depth 1 --branch master https://github.com/raspberrypi/pico-sdk.git
        cd pico-sdk
        git submodule update --init --depth 1
    
    - name: Configure CMake
      env:
        PICO_SDK_PATH: ${{ github.workspace }}/pico-sdk
      run: cmake -B build

    - name: Build project
      run: cmake --build build --parallel 2

    - name: Upload UF2 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: flight-recorder-firmware
        path: build/*.uf2